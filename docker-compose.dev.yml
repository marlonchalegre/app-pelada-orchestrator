services:
  frontend:
    hostname: frontend
    environment:
      - PORT=8080
      - VITE_BACKEND_URL=http://backend:8000
    build:
      context: ./web-peladaapp
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./web-peladaapp/src:/app/src
      - ./web-peladaapp/public:/app/public
      - ./web-peladaapp/index.html:/app/index.html
      - ./web-peladaapp/vite.config.ts:/app/vite.config.ts
      - ./web-peladaapp/tsconfig.json:/app/tsconfig.json
      - ./web-peladaapp/tsconfig.app.json:/app/tsconfig.app.json
    depends_on:
      - backend

  backend:
    hostname: backend
    environment:
      - PELADA_API_SECURITY_SIGNING_KEY=secret-for-dev-only-not-for-prod
      - WAHA_API_KEY=${WAHA_API_KEY:-dev-api-key}
      - DATABASE_URL=postgres://pelada:pelada_pass@postgres:5432/peladaapp
      - SKIP_MIGRATIONS=false
    build:
      context: ./api-peladaapp
      dockerfile: Dockerfile.dev
    ports:
      - 8000:8000
    volumes:
      - ./api-peladaapp:/app
      - ./uploads:/app/uploads

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=pelada
      - POSTGRES_PASSWORD=pelada_pass
      - POSTGRES_DB=peladaapp
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  waha:
    image: ${WAHA_IMAGE:-devlikeapro/waha:arm}
    restart: always
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY:-dev-api-key}
      - WAHA_DASHBOARD_PASSWORD=ee54354c72854f2283a373c064c7eeb8
      - WHATSAPP_SWAGGER_PASSWORD=ee54354c72854f2283a373c064c7eeb8
      - WHATSAPP_API_BASE_URL=http://localhost:3000/waha/
      - WAHA_DASHBOARD_ENABLED=false
      - WAHA_SWAGGER_ENABLED=true

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 8080:80
    depends_on:
      - frontend
      - backend

  scheduler-trigger:
    image: alpine:latest
    container_name: pelada-cron-dev
    restart: always
    depends_on:
      - backend
    entrypoint: |
      sh -c 'echo "*/5 * * * * wget -qO- --post-data=\"\" http://backend:8000/internal/scheduler/tick" > /etc/crontabs/root && crond -f'
