apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: peladaapp
data:
  default.conf: |
    server {
        listen 8080;
        charset utf-8;
        absolute_redirect off;

        # Serve built frontend static files
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # Service Worker - no cache
        location /sw.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # Version info - no cache
        location /version.json {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }

        # Manifest - correct mime type
        location /manifest.json {
            add_header Content-Type "application/manifest+json";
        }

        # Handle main entry points with fallback to latest version (gambiarra for cached index.html)
        location ~* /assets/index-.*\.js$ {
            include /usr/share/nginx/html/assets/latest.conf;
            try_files $uri @latest_js;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location @latest_js {
            include /usr/share/nginx/html/assets/latest.conf;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            return 302 /assets/$latest_index_js;
        }

        location ~* /assets/index-.*\.css$ {
            include /usr/share/nginx/html/assets/latest.conf;
            try_files $uri @latest_css;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location @latest_css {
            include /usr/share/nginx/html/assets/latest.conf;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            return 302 /assets/$latest_index_css;
        }

        # Hashed JS and CSS - 1 year cache
        location ~* \.(?:css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Images, Fonts and other assets - 1 month cache
        location ~* \.(?:jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1M;
            add_header Cache-Control "public";
        }

        # Proxy API and Auth requests to backend service
        # Note the use of the Kubernetes service name 'backend'
        location ~ ^/(api|auth) {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect default;
        }
    }
