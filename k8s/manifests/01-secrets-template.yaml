apiVersion: v1
kind: Secret
metadata:
  name: peladaapp-secrets
  namespace: peladaapp
type: Opaque
stringData:
  # -------------------------------------------------------------------------
  # IMPORTANT: THESE ARE FAKE/EXAMPLE KEYS! 
  # DO NOT USE THESE IN PRODUCTION. CHANGE THEM TO YOUR ACTUAL SECRETS.
  # -------------------------------------------------------------------------

  # Database (Pointing to Postgres installed on the VPS Host via K3s gateway)
  DATABASE_URL: "jdbc:postgresql://10.42.0.1:5432/peladadb?user=pelada_user&password=pelada_password"
  POSTGRES_USER: "pelada_user"
  POSTGRES_PASSWORD: "pelada_password"
  POSTGRES_DB: "peladadb"
  
  # Security
  PELADA_API_SECURITY_SIGNING_KEY: "replace_with_your_secure_signing_key_here"
  
  # WAHA (WhatsApp)
  WAHA_API_KEY: "replace_with_waha_api_key"
  WAHA_DASHBOARD_USERNAME: "admin"
  WAHA_DASHBOARD_PASSWORD: "replace_with_waha_dashboard_password"
  
  # SMTP (Email)
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "your-email@gmail.com"
  SMTP_PASS: "your-app-password"
  SMTP_FROM: "PeladaApp <your-email@gmail.com>"
  
  # App Configuration
  FRONTEND_URL: "https://pelada.yourdomain.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-token
  namespace: peladaapp
type: Opaque
stringData:
  # -------------------------------------------------------------------------
  # IMPORTANT: THIS IS A FAKE TOKEN!
  # Replace with the token provided by Cloudflare Zero Trust Dashboard
  # -------------------------------------------------------------------------
  TUNNEL_TOKEN: "replace_with_your_cloudflared_token_here"
