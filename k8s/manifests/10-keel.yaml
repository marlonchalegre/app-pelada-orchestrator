apiVersion: v1
kind: Namespace
metadata:
  name: keel
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keel
  namespace: keel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keel
  template:
    metadata:
      labels:
        app: keel
    spec:
      containers:
        - name: keel
          image: keelhq/keel:latest
          imagePullPolicy: Always
          env:
            - name: POLL_INTERVAL
              value: "1m" # Check for new images every minute
            - name: DEBUG
              value: "false"
            - name: UI_ENABLED
              value: "true"
            - name: UI_USER
              valueFrom:
                secretKeyRef:
                  name: keel-secrets
                  key: KEEL_PORTAL_USER
            - name: UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keel-secrets
                  key: KEEL_PORTAL_PASSWORD
          ports:
            - containerPort: 9300
          volumeMounts:
            - mountPath: /etc/keel
              name: keel-conf
            - mountPath: /var/run/docker.sock
              name: docker-sock
      volumes:
        - name: keel-conf
          emptyDir: {}
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
---
apiVersion: v1
kind: Service
metadata:
  name: keel
  namespace: keel
spec:
  ports:
    - port: 9300
      targetPort: 9300
  selector:
    app: keel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keel-cluster-admin
subjects:
  - kind: ServiceAccount
    name: default
    namespace: keel
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
