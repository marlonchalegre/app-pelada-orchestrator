apiVersion: batch/v1
kind: CronJob
metadata:
  name: scheduler-trigger
  namespace: peladaapp
spec:
  schedule: "*/5 * * * *" # Every 5 minutes
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: curl
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - "curl -s -X POST http://backend.peladaapp.svc.cluster.local:8000/internal/scheduler/tick || exit 0"
