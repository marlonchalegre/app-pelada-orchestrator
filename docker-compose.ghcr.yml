services:
  frontend:
    restart: always
    image: ghcr.io/marlonchalegre/pelada-web:${TAG:-latest}
    ports:
      - 80:80
    volumes:
      - ./nginx/frontend.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - waha

  backend:
    restart: always
    image: ghcr.io/marlonchalegre/pelada-api:${TAG:-latest}
    environment:
      - DB_NAME=data/peladaapp.db
      - SKIP_MIGRATIONS=false
      - APP_VERSION=${TAG:-latest}
      - PELADA_API_SECURITY_SIGNING_KEY=${PELADA_API_SECURITY_SIGNING_KEY}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - LITESTREAM_ACCESS_KEY_ID=${LITESTREAM_ACCESS_KEY_ID}
      - LITESTREAM_SECRET_ACCESS_KEY=${LITESTREAM_SECRET_ACCESS_KEY}
      - LITESTREAM_BUCKET=${LITESTREAM_BUCKET}
      - LITESTREAM_ENDPOINT=${LITESTREAM_ENDPOINT}
    volumes:
      - ./data:/app/data
      - ./api-peladaapp/litestream.yml:/etc/litestream.yml:ro
    depends_on:
      - waha

  waha:
    image: ${WAHA_IMAGE:-devlikeapro/waha:arm}
    restart: always
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WHATSAPP_SWAGGER_USERNAME=${WAHA_DASHBOARD_USERNAME}
      - WHATSAPP_SWAGGER_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WAHA_SWAGGER_ENABLED=false
      - WHATSAPP_API_BASE_URL=/waha/
      - WAHA_PUBLIC_URL=https://pelada.mcp.dev.br/waha
      - WAHA_DASHBOARD_ENABLED=true
    volumes:
      - ./waha_data:/app/.waha/sessions
