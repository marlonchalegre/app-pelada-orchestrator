services:
  frontend:
    restart: always
    hostname: frontend
    environment:
      - PORT=8080
      - LANG=en_US.UTF-8
      - VITE_GOOGLE_ANALYTICS_ID=${VITE_GOOGLE_ANALYTICS_ID}
    build:
      context: ./web-peladaapp
      dockerfile: Dockerfile
      target: dev
    volumes:
      - /app/node_modules
      - ./web-peladaapp:/app
    depends_on:
      - backend

  backend:
    restart: always
    hostname: backend
    environment:
      - APP_VERSION=development
      - LANG=en_US.UTF-8
      - PELADA_API_SECURITY_SIGNING_KEY=${PELADA_API_SECURITY_SIGNING_KEY:-dev-secret-key-change-me-in-prod}
      - WAHA_API_KEY=${WAHA_API_KEY:-dev-api-key}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - JAVA_OPTS=-Djdk.attach.allowAttachSelf=true
    build:
      context: ./api-peladaapp
      dockerfile: Dockerfile.dev
    cap_add:
      - SYS_ADMIN
    ports:
      - 8000:8000
      - 8081:8081
    volumes:
      - ./api-peladaapp:/app
      - ./uploads:/app/uploads

  waha:
    image: ${WAHA_IMAGE:-devlikeapro/waha:arm}
    restart: always
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY:-dev-api-key}
      - WAHA_DASHBOARD_PASSWORD=ee54354c72854f2283a373c064c7eeb8
      - WHATSAPP_SWAGGER_PASSWORD=ee54354c72854f2283a373c064c7eeb8
      - WAHA_DASHBOARD_ENABLED=false
      - WAHA_SWAGGER_ENABLED=true
      - WHATSAPP_DEFAULT_ENGINE=GOWS
      - WAHA_RESTART_ALL_SESSIONS=True
      - WAHA_AUTO_START_DELAY_SECONDS=5
      - WAHA_LOCAL_STORE_BASE_DIR=/app/.waha/sessions
      - WAHA_SQLITE_ENGINE=sqlite3
    volumes:
      - ./waha_data:/app/.waha/sessions

  nginx:
    restart: always
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 8080:80
    depends_on:
      - frontend
      - backend

  scheduler-trigger:
    image: alpine:latest
    container_name: pelada-cron
    restart: always
    depends_on:
      - backend
    entrypoint: |
      sh -c 'echo "*/5 * * * * wget -qO- --post-data=\"\" http://backend:8000/internal/scheduler/tick" > /etc/crontabs/root && \
             echo "*/2 * * * * wget -qO- http://backend:8000/internal/waha/healthcheck || wget -qO- --post-data=\"\" http://backend:8000/internal/waha/resume" >> /etc/crontabs/root && \
             crond -f'
