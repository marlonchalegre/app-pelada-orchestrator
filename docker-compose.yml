services:
  frontend:
    restart: always
    hostname: frontend
    environment:
      - PORT=${PORT}
      - LANG=${LANG}
      - VITE_GOOGLE_ANALYTICS_ID=${VITE_GOOGLE_ANALYTICS_ID}
    build:
      context: ./web-peladaapp
      dockerfile: Dockerfile
      target: dev
    volumes:
      - /app/node_modules
      - ./web-peladaapp:/app
    depends_on:
      - backend

  backend:
    restart: always
    hostname: backend
    environment:
      - APP_VERSION=${APP_VERSION}
      - LANG=${LANG}
      - PELADA_API_SECURITY_SIGNING_KEY=${PELADA_API_SECURITY_SIGNING_KEY}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - FRONTEND_URL=${FRONTEND_URL}
      - DATABASE_URL=${DATABASE_URL}
      - DB_SCHEMA=${DB_SCHEMA}
      - JAVA_OPTS=${JAVA_OPTS}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD}
    build:
      context: ./api-peladaapp
      dockerfile: Dockerfile.dev
    cap_add:
      - SYS_ADMIN
    ports:
      - 8000:8000
      - 8081:8081
    volumes:
      - ./api-peladaapp:/app
      - ./uploads:/app/uploads
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  waha:
    image: ${WAHA_IMAGE}
    restart: always
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WHATSAPP_SWAGGER_PASSWORD=${WHATSAPP_SWAGGER_PASSWORD}
      - WAHA_DASHBOARD_ENABLED=${WAHA_DASHBOARD_ENABLED}
      - WAHA_SWAGGER_ENABLED=${WAHA_SWAGGER_ENABLED}
      - WHATSAPP_DEFAULT_ENGINE=${WHATSAPP_DEFAULT_ENGINE}
      - WAHA_RESTART_ALL_SESSIONS=${WAHA_RESTART_ALL_SESSIONS}
      - WAHA_AUTO_START_DELAY_SECONDS=${WAHA_AUTO_START_DELAY_SECONDS}
      - WAHA_LOCAL_STORE_BASE_DIR=${WAHA_LOCAL_STORE_BASE_DIR}
      - WAHA_SQLITE_ENGINE=${WAHA_SQLITE_ENGINE}
    volumes:
      - ./waha_data:/app/.waha/sessions

  nginx:
    restart: always
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 8080:80
    depends_on:
      - frontend
      - backend

  scheduler-trigger:
    image: alpine:latest
    container_name: pelada-cron
    restart: always
    depends_on:
      - backend
    entrypoint: |
      sh -c 'echo "*/5 * * * * wget -qO- --post-data=\"\" http://backend:8000/internal/scheduler/tick" > /etc/crontabs/root && \
             echo "*/2 * * * * wget -qO- http://backend:8000/internal/waha/healthcheck || wget -qO- --post-data=\"\" http://backend:8000/internal/waha/resume" >> /etc/crontabs/root && \
             crond -f'
