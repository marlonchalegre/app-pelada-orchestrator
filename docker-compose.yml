services:
  frontend:
    restart: always
    hostname: frontend
    environment:
      - PORT=8080
      - LANG=en_US.UTF-8
      - VITE_GOOGLE_ANALYTICS_ID=${VITE_GOOGLE_ANALYTICS_ID}
    build:
      context: ./web-peladaapp
      dockerfile: Dockerfile
      target: dev
    volumes:
      - /app/node_modules
      - ./web-peladaapp:/app
    depends_on:
      - backend

  backend:
    restart: always
    hostname: backend
    environment:
      - APP_VERSION=development
      - LANG=en_US.UTF-8
      - PELADA_API_SECURITY_SIGNING_KEY=${PELADA_API_SECURITY_SIGNING_KEY:-dev-secret-key-change-me-in-prod}
      - WAHA_API_KEY=${WAHA_API_KEY:-dev-api-key}
    build:
      context: ./api-peladaapp
      dockerfile: Dockerfile.dev
    ports:
      - 8000:8000
    volumes:
      - ./api-peladaapp:/app

  waha:
    image: ${WAHA_IMAGE:-devlikeapro/waha:arm}
    restart: always
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY:-dev-api-key}
      - WAHA_DASHBOARD_PASSWORD=ee54354c72854f2283a373c064c7eeb8
      - WHATSAPP_SWAGGER_PASSWORD=ee54354c72854f2283a373c064c7eeb8
      - WAHA_DASHBOARD_ENABLED=false
      - WAHA_SWAGGER_ENABLED=true
      - WHATSAPP_DEFAULT_ENGINE=GOWS
    ports:
      - 3000:3000
    volumes:
      - ./waha_data:/app/.waha/sessions

  nginx:
    restart: always
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 8080:80
    depends_on:
      - frontend
      - backend
